<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cow head -->
  <circle cx="50" cy="50" r="40" fill="#F5E6D3" stroke="#D4B896" stroke-width="2"/>
  
  <!-- Ears -->
  <ellipse cx="30" cy="25" rx="8" ry="15" fill="#F5E6D3" stroke="#D4B896" stroke-width="2"/>
  <ellipse cx="70" cy="25" rx="8" ry="15" fill="#F5E6D3" stroke="#D4B896" stroke-width="2"/>
  
  <!-- Spots -->
  <ellipse cx="35" cy="40" rx="6" ry="8" fill="#D4B896"/>
  <ellipse cx="60" cy="55" rx="8" ry="10" fill="#D4B896"/>
  <ellipse cx="45" cy="65" rx="5" ry="6" fill="#D4B896"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="45" r="5" fill="white"/>
  <circle cx="60" cy="45" r="5" fill="white"/>
  <circle cx="40" cy="45" r="2" fill="black"/>
  <circle cx="60" cy="45" r="2" fill="black"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="6" ry="4" fill="#FFC0CB"/>
  
  <!-- Smile -->
  <path d="M 40 65 Q 50 75 60 65" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
</svg>